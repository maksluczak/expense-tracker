<div class="form-overlay" (click)="cancelled.emit()">
  <div class="form-card" (click)="$event.stopPropagation()">

    <h2 class="form-card__title">Nowa transakcja</h2>
    <div class="type-tabs">
      <button type="button" class="type-tabs__btn" [class.type-tabs__btn--active]="activeTab === 'expense'"
        (click)="setTab('expense')">
        ↓ Wydatek
      </button>
      <button type="button" class="type-tabs__btn" [class.type-tabs__btn--active]="activeTab === 'income'"
        (click)="setTab('income')">
        ↑ Przychód
      </button>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="field">
        <label class="field__label" for="amount">Kwota (PLN)</label>
        <input id="amount" class="field__input" [class.field__input--error]="isInvalid('amount')" type="number"
          formControlName="amount" placeholder="0.00" step="0.01" />
        @if (isInvalid('amount')) {
        <span class="field__error">Podaj kwotę większą od 0</span>
        }
      </div>

      <div class="field">
        <label class="field__label" for="description">Opis</label>
        <input id="description" class="field__input" [class.field__input--error]="isInvalid('description')" type="text"
          formControlName="description" placeholder="Za co?" />
        @if (isInvalid('description')) {
        <span class="field__error">Opis jest wymagany</span>
        }
      </div>
      @if (activeTab === 'expense') {
      <div class="field">
        <label class="field__label" for="expenseType">Kategoria</label>
        <select id="expenseType" class="field__input" formControlName="expenseType">
          @for (type of expenseTypes; track type) {
          <option [value]="type">{{ expenseLabels[type] }}</option>
          }
        </select>
      </div>
      }
      <div class="field">
        <label class="field__label" for="date">Data</label>
        <input id="date" class="field__input" type="date" formControlName="date" />
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--secondary" (click)="cancelled.emit()">
          Anuluj
        </button>
        <button type="submit" class="btn btn--primary" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Zapisywanie...' : 'Zapisz' }}
        </button>
      </div>
    </form>
  </div>
</div>
